services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD?DB_ROOT_PASSWORD set degil}"
    command: ["--skip-name-resolve"]
    volumes:
      - mariadb_data:/var/lib/mysql   # named volume: CI’da daha stabil
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 60
    restart: unless-stopped
    networks: [appnet]

  ispconfig:
    build:
      context: ./installer/panel
    container_name: ispconfig
    env_file: .env
    depends_on:
      mariadb:
        condition: service_healthy
    # CI’da istersen tamamini named volume ile calistir; lokalde bind mount’a geri donebilirsin
    volumes:
      - ./installer/autoinstall.ini.tmpl:/opt/templates/autoinstall.ini.tmpl:ro
      - isp_usr:/usr/local/ispconfig
      - isp_etc:/etc/ispconfig
      - isp_state:/var/lib/ispconfig
      - isp_logs_nginx:/var/log/nginx
      - isp_logs_panel:/var/log/ispconfig
      - isp_acme:/root/.acme.sh
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${PANEL_PORT:-8080}:8080"
    healthcheck:
      # Installer sonrasi panel sagligi; oncesinde default nginx /status calisir
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PANEL_PORT:-8080}/login/?v=hc || curl -fsS http://127.0.0.1:80/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
    restart: unless-stopped
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  mariadb_data:
  isp_usr:
  isp_etc:
  isp_state:
  isp_logs_nginx:
  isp_logs_panel:
  isp_acme: